<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560">
  <defs>
    <!-- Main blue gradient (face) -->
    <linearGradient id="faceFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B7BFF"/>
      <stop offset="100%" stop-color="#0A3FC4"/>
    </linearGradient>

    <!-- Side face (darker = depth illusion) -->
    <linearGradient id="faceRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A3FC4"/>
      <stop offset="100%" stop-color="#061E6B"/>
    </linearGradient>

    <!-- Top face (lightest) -->
    <linearGradient id="faceTop" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#5E9AFF"/>
      <stop offset="100%" stop-color="#3B7BFF"/>
    </linearGradient>

    <!-- Tail gradient -->
    <linearGradient id="tailGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#1354E8"/>
    </linearGradient>

    <!-- Shine overlay -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <!-- Shadow under mark -->
    <radialGradient id="dropShadow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="rgba(19,84,232,0.28)"/>
      <stop offset="100%" stop-color="rgba(19,84,232,0)"/>
    </radialGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Subtle drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="rgba(10,22,40,0.5)"/>
    </filter>

    <!-- Inner shadow on ring -->
    <filter id="innerShadow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <clipPath id="primaryClip">
      <rect x="0" y="0" width="320" height="560"/>
    </clipPath>
    <clipPath id="secondaryClip">
      <rect x="320" y="0" width="320" height="560"/>
    </clipPath>
    <clipPath id="submarkClip">
      <rect x="640" y="0" width="320" height="560"/>
    </clipPath>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="960" height="560" fill="#F0F3F8"/>
  <!-- Subtle vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="rgba(240,243,248,0)"/>
    <stop offset="100%" stop-color="rgba(200,210,225,0.4)"/>
  </radialGradient>
  <rect width="960" height="560" fill="url(#vignette)"/>

  <!-- Panel lines -->
  <line x1="320" y1="0" x2="320" y2="560" stroke="#DDE3EE" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="560" stroke="#DDE3EE" stroke-width="1"/>

  <!-- Panel labels -->
  <text x="160" y="50" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="8.5" font-weight="600" letter-spacing="4" fill="#B0BDD0">PRIMARY</text>
  <text x="480" y="50" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="8.5" font-weight="600" letter-spacing="4" fill="#B0BDD0">SECONDARY</text>
  <text x="800" y="50" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="8.5" font-weight="600" letter-spacing="4" fill="#B0BDD0">SUBMARK</text>


  <!-- ════════════════════════════════════════════ -->
  <!-- PRIMARY  (center x=160, icon top ~185)       -->
  <!-- ════════════════════════════════════════════ -->

  <!-- Drop shadow ellipse -->
  <ellipse cx="160" cy="268" rx="48" ry="10" fill="url(#dropShadow)"/>

  <!-- 3D Q MARK — built with layered rings -->
  <!-- Depth layer: offset ring (right+down = right-side face of torus) -->
  <circle cx="164" cy="214" r="36" fill="none" stroke="#061E6B" stroke-width="11"/>
  <!-- Main front ring -->
  <circle cx="160" cy="210" r="36" fill="none" stroke="url(#faceFront)" stroke-width="11" filter="url(#shadow)"/>
  <!-- Top-light highlight arc (top portion brighter) -->
  <path d="M 132 192 A 36 36 0 0 1 188 192" fill="none" stroke="url(#faceTop)" stroke-width="11" stroke-linecap="butt"/>
  <!-- Shine gloss arc on top-left -->
  <path d="M 136 196 A 36 36 0 0 1 178 188" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="6" stroke-linecap="round"/>

  <!-- 3D TAIL -->
  <!-- Tail shadow (depth offset) -->
  <line x1="179" y1="237" x2="200" y2="258" stroke="#061E6B" stroke-width="10" stroke-linecap="round"/>
  <!-- Tail right face -->
  <line x1="181" y1="235" x2="202" y2="256" stroke="#0A3FC4" stroke-width="9" stroke-linecap="round"/>
  <!-- Tail front face -->
  <line x1="177" y1="234" x2="198" y2="255" stroke="url(#tailGrad)" stroke-width="9" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Tail top shine -->
  <line x1="175" y1="234" x2="196" y2="255" stroke="rgba(255,255,255,0.2)" stroke-width="4" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="160" y="296" text-anchor="middle"
        font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="17.5" font-weight="700" letter-spacing="6"
        fill="#0A1628">QUANTRIX</text>
  <line x1="118" y1="305" x2="202" y2="305" stroke="#D0D8E8" stroke-width="0.75"/>
  <text x="160" y="319" text-anchor="middle"
        font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="7.5" font-weight="400" letter-spacing="5"
        fill="#8FA0B8">OUTSOURCING</text>


  <!-- ════════════════════════════════════════════ -->
  <!-- SECONDARY  (horizontal, center x=480)        -->
  <!-- ════════════════════════════════════════════ -->

  <!-- Drop shadow -->
  <ellipse cx="408" cy="290" rx="34" ry="7" fill="url(#dropShadow)"/>

  <!-- 3D Q small -->
  <circle cx="411" cy="270" r="25" fill="none" stroke="#061E6B" stroke-width="8"/>
  <circle cx="408" cy="267" r="25" fill="none" stroke="url(#faceFront)" stroke-width="8" filter="url(#shadow)"/>
  <path d="M 390 254 A 25 25 0 0 1 426 254" fill="none" stroke="url(#faceTop)" stroke-width="8" stroke-linecap="butt"/>
  <path d="M 392 257 A 25 25 0 0 1 422 251" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4" stroke-linecap="round"/>

  <!-- Tail -->
  <line x1="423" y1="282" x2="438" y2="297" stroke="#061E6B" stroke-width="7" stroke-linecap="round"/>
  <line x1="424" y1="280" x2="439" y2="295" stroke="#0A3FC4" stroke-width="6.5" stroke-linecap="round"/>
  <line x1="421" y1="280" x2="436" y2="295" stroke="url(#tailGrad)" stroke-width="6.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="419" y1="279" x2="434" y2="294" stroke="rgba(255,255,255,0.2)" stroke-width="3" stroke-linecap="round"/>

  <!-- Divider -->
  <line x1="458" y1="254" x2="458" y2="286" stroke="#D0D8E8" stroke-width="1"/>

  <!-- Wordmark -->
  <text x="472" y="273" text-anchor="start"
        font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="15.5" font-weight="700" letter-spacing="5"
        fill="#0A1628">QUANTRIX</text>
  <text x="473" y="286" text-anchor="start"
        font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="7" font-weight="400" letter-spacing="5"
        fill="#8FA0B8">OUTSOURCING</text>


  <!-- ════════════════════════════════════════════ -->
  <!-- SUBMARK  (icon only, right panel x=800)      -->
  <!-- ════════════════════════════════════════════ -->

  <!-- Drop shadow -->
  <ellipse cx="800" cy="268" rx="60" ry="12" fill="url(#dropShadow)"/>

  <!-- 3D Q — large -->
  <circle cx="805" cy="224" r="46" fill="none" stroke="#061E6B" stroke-width="13"/>
  <circle cx="800" cy="219" r="46" fill="none" stroke="url(#faceFront)" stroke-width="13" filter="url(#shadow)"/>
  <path d="M 764 199 A 46 46 0 0 1 836 199" fill="none" stroke="url(#faceTop)" stroke-width="13" stroke-linecap="butt"/>
  <path d="M 768 204 A 46 46 0 0 1 828 196" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="7" stroke-linecap="round"/>

  <!-- Tail -->
  <line x1="822" y1="247" x2="847" y2="272" stroke="#061E6B" stroke-width="12" stroke-linecap="round"/>
  <line x1="824" y1="244" x2="849" y2="269" stroke="#0A3FC4" stroke-width="11" stroke-linecap="round"/>
  <line x1="820" y1="244" x2="845" y2="269" stroke="url(#tailGrad)" stroke-width="11" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="817" y1="243" x2="842" y2="268" stroke="rgba(255,255,255,0.22)" stroke-width="5" stroke-linecap="round"/>

  <!-- Small scale label -->
  <text x="800" y="316" text-anchor="middle"
        font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="8" letter-spacing="3" fill="#B0BDD0">SMALL SCALE</text>

  <!-- 36px -->
  <circle cx="769" cy="350" r="14" fill="none" stroke="#0D2A8A" stroke-width="4.5"/>
  <circle cx="767" cy="348" r="14" fill="none" stroke="url(#faceFront)" stroke-width="4.5"/>
  <path d="M 757 341 A 14 14 0 0 1 777 341" fill="none" stroke="url(#faceTop)" stroke-width="4.5" stroke-linecap="butt"/>
  <line x1="776" y1="356" x2="784" y2="364" stroke="#061E6B" stroke-width="4" stroke-linecap="round"/>
  <line x1="775" y1="354" x2="783" y2="362" stroke="url(#tailGrad)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- 20px -->
  <circle cx="832" cy="350" r="10" fill="none" stroke="#0D2A8A" stroke-width="3.5"/>
  <circle cx="830" cy="348" r="10" fill="none" stroke="url(#faceFront)" stroke-width="3.5"/>
  <path d="M 821 342 A 10 10 0 0 1 839 342" fill="none" stroke="url(#faceTop)" stroke-width="3.5" stroke-linecap="butt"/>
  <line x1="837" y1="355" x2="843" y2="361" stroke="#061E6B" stroke-width="3" stroke-linecap="round"/>
  <line x1="836" y1="354" x2="842" y2="360" stroke="url(#tailGrad)" stroke-width="2.5" stroke-linecap="round"/>


  <!-- ════════════════════════════════════════════ -->
  <!-- SWATCHES                                     -->
  <!-- ════════════════════════════════════════════ -->
  <text x="480" y="424" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="8" letter-spacing="3.5" fill="#B0BDD0">PALETTE</text>

  <!-- Swatch with 3D bevel illusion -->
  <!-- Navy -->
  <rect x="298" y="436" width="52" height="34" rx="5" fill="#0A1628"/>
  <rect x="298" y="436" width="52" height="6" rx="5" fill="rgba(255,255,255,0.07)"/>
  <text x="324" y="484" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="7.5" fill="#8FA0B8">#0A1628</text>
  <text x="324" y="494" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="7" fill="#B0BDD0" letter-spacing="1">NAVY</text>

  <!-- Blue -->
  <rect x="362" y="436" width="52" height="34" rx="5" fill="#1354E8"/>
  <rect x="362" y="436" width="52" height="6" rx="5" fill="rgba(255,255,255,0.12)"/>
  <text x="388" y="484" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="7.5" fill="#8FA0B8">#1354E8</text>
  <text x="388" y="494" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="7" fill="#B0BDD0" letter-spacing="1">BLUE</text>

  <!-- Cyan -->
  <rect x="426" y="436" width="52" height="34" rx="5" fill="#00D4FF"/>
  <rect x="426" y="436" width="52" height="6" rx="5" fill="rgba(255,255,255,0.18)"/>
  <text x="452" y="484" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="7.5" fill="#8FA0B8">#00D4FF</text>
  <text x="452" y="494" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="7" fill="#B0BDD0" letter-spacing="1">CYAN</text>

  <!-- Deep blue -->
  <rect x="490" y="436" width="52" height="34" rx="5" fill="#061E6B"/>
  <rect x="490" y="436" width="52" height="6" rx="5" fill="rgba(255,255,255,0.06)"/>
  <text x="516" y="484" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="7.5" fill="#8FA0B8">#061E6B</text>
  <text x="516" y="494" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="7" fill="#B0BDD0" letter-spacing="1">DEPTH</text>

  <!-- Off white -->
  <rect x="554" y="436" width="52" height="34" rx="5" fill="#F0F3F8" stroke="#DDE3EE" stroke-width="1"/>
  <rect x="554" y="436" width="52" height="6" rx="5" fill="rgba(255,255,255,0.5)"/>
  <text x="580" y="484" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="7.5" fill="#8FA0B8">#F0F3F8</text>
  <text x="580" y="494" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="7" fill="#B0BDD0" letter-spacing="1">WHITE</text>

  <!-- Footer -->
  <text x="480" y="540" text-anchor="middle"
        font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="7.5" letter-spacing="2.5" fill="#C8D0DC">QUANTRIX OUTSOURCING — BRAND IDENTITY 2025</text>
</svg>
